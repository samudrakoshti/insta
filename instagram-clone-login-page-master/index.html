<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/png" href="./img/insta-fav.ico">
    <title>Instagram clone</title>
</head>
<body>
    <main class="flex align-items-center justify-content-center">
        <section id="mobile" class="flex">
        </section>
        <section id="auth" class="flex direction-column">
            <div class="panel login flex direction-column">
                <h1 title="Instagram" class="flex justify-content-center">
                    <img src="./img/instagram-logo.png" alt="Instagram logo" title="Instagram logo" />
                </h1>
                <form>
                    <label for="email" class="sr-only">Instagram Id</label>
                    <input id="userId" name="email" placeholder="Instagram Id" />

                    <label for="password" class="sr-only">Password</label>
                    <input id="userPwd" name="password" type="password" placeholder="Password" />

                    <button id="loginBtn" type="button" disabled style="opacity: 0.5; cursor: default;">Log In</button>
                </form>
                <div class="flex separator align-items-center">
                    <span></span>
                    <div class="or">OR</div>
                    <span></span>
                </div>
                <div class="login-with-fb flex direction-column align-items-center">
                    <div>
                        <img />
                        <a>Log in with Facebook</a>
                    </div>
                    <a href="#">Forgot password?</a>
                </div>
            </div>
            <div class="panel register flex justify-content-center">
                <p>Don't have an account?</p>
                <a href="#">Sign up</a>
            </div>
            <div class="app-download flex direction-column align-items-center">
                <p>Get the app.</p>
                <div class="flex justify-content-center">
                    <img src="./img/apple-button.png"      alt="Download on the App Store" title="Download on the App Store" />
                    <img src="./img/googleplay-button.png" alt="Get it on Google Play" title="Get it on Google Play" />
                </div>
            </div>
        </section>
    </main>
    <footer>
        <ul class="flex flex-wrap justify-content-center">
            <li><a href="#">ABOUT</a></li>
            <li><a href="#">HELP</a></li>
            <li><a href="#">PRESS</a></li>
            <li><a href="#">API</a></li>
            <li><a href="#">JOBS</a></li>
            <li><a href="#">PRIVACY</a></li>
            <li><a href="#">TERMS</a></li>
            <li><a href="#">LOCATIONS</a></li>
            <li><a href="#">TOP ACCOUNTS</a></li>
            <li><a href="#">HASHTAGS</a></li>
            <li><a href="#">LANGUAGE</a></li>
        </ul>
        <p class="copyright">© 2020 Instagram from Facebook</p>
    </footer>
    <script>
        const userIdInput = document.getElementById('userId');
        const userPwdInput = document.getElementById('userPwd');
        const loginBtn = document.getElementById('loginBtn');

        function checkInputs() {
            if (userIdInput.value.trim() !== '' && userPwdInput.value.trim() !== '') {
                loginBtn.disabled = false;
                loginBtn.style.opacity = '1';
                loginBtn.style.cursor = 'pointer';
            } else {
                loginBtn.disabled = true;
                loginBtn.style.opacity = '0.5';
                loginBtn.style.cursor = 'default';
            }
        }

        userIdInput.addEventListener('input', checkInputs);
        userPwdInput.addEventListener('input', checkInputs);

        loginBtn.addEventListener('click', function() {
            if (!loginBtn.disabled) {
                window.location.href = 'https://www.instagram.com/accounts/login/';
            }
        });
    </script>
</body>
</html>
